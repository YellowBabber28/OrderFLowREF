function buildStagesFromTemplate(name) {
  const t = ORDER_TEMPLATES[name]; if (!t) return [];
  let c = 0;
  return t.map((s) => ({ name: s.name, nodes: s.steps.map((step) => { c++; return { id: `n${c}`, label: step, status: "not_started", assignee: null, completedAt: null, startedAt: null, completedBy: null, completionNotes: "" }; }) }));
}

function buildDemoForeclosure() {
  const stages = buildStagesFromTemplate("Foreclosure Lawsuit Package");
  const comp = [
    { idx: [0,0], by: "sm", at: "10/05/25", st: "10/05/25", n: "Welcome email sent with portal access link and document checklist." },
    { idx: [0,1], by: "sm", at: "10/06/25", st: "10/05/25", n: "Initial consultation scheduled for 10/07. Client prefers morning calls before 11am." },
    { idx: [1,0], by: "tc", at: "10/12/25", st: "10/07/25", n: "All documents received via portal: mortgage statement, NOD, loan mod denial letter, property tax records." },
    { idx: [2,0], by: "jm", at: "10/14/25", st: "10/13/25", n: "Full intake completed. Client in property since 2015. Missed payments began March 2025 due to job loss." },
    { idx: [2,1], by: "jm", at: "10/16/25", st: "10/14/25", n: "All documents reviewed and organized. Found discrepancies in loan servicer's accounting." },
    { idx: [2,2], by: "mm", at: "10/18/25", st: "10/16/25", n: "Summary intake prepared. Key issues: dual tracking violation, improper NOD, RESPA violations." },

  stages[2].nodes[3].status = "in_progress"; stages[2].nodes[3].assignee = "ar"; stages[2].nodes[3].startedAt = "10/19/25";
  return stages;
}

function Toast({ message, type, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2500); return () => clearTimeout(t); }, [onDone]);
  const bg = type === "success" ? "#059669" : type === "warning" ? "#d97706" : "#6b7280";
  return (
    <div style={{ position: "fixed", bottom: 32, left: "50%", transform: "translateX(-50%)", zIndex: 9999, padding: "12px 24px", background: bg, color: "#fff", borderRadius: 10, fontSize: 14, fontWeight: 600, fontFamily: "'Inter', sans-serif", boxShadow: "0 8px 32px rgba(0,0,0,0.25)", animation: "toastIn 0.25s ease", display: "flex", alignItems: "center", gap: 8 }}>
      {type === "success" && <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 8L7 11L12 5" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" /></svg>}
      {type === "warning" && <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 4V9M8 11.5V12" stroke="#fff" strokeWidth="2" strokeLinecap="round" /></svg>}
      {message}
    </div>
  );
}

function ConfirmDialog({ title, message, confirmLabel, confirmColor, onConfirm, onCancel }) {
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 9998, fontFamily: "'Inter', sans-serif" }}>
      <div style={{ background: "#fff", borderRadius: 14, padding: "28px", width: 420, boxShadow: "0 20px 60px rgba(0,0,0,0.2)", animation: "fadeIn 0.15s ease" }}>

        <p style={{ margin: "0 0 24px", fontSize: 14, color: "#6b7280", lineHeight: 1.5 }}>{message}</p>
        <div style={{ display: "flex", justifyContent: "flex-end", gap: 10 }}>
          <button onClick={onCancel} style={{ padding: "9px 20px", background: "#fff", border: "1px solid #d1d5db", borderRadius: 8, color: "#374151", fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Go Back</button>
          <button onClick={onConfirm} style={{ padding: "9px 20px", background: confirmColor || "#dc2626", border: "none", borderRadius: 8, color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>{confirmLabel}</button>

      </div>
    </div>
  );
}

function StaffSearchPicker({ selected, onSelect }) {
  const [search, setSearch] = useState("");
  const filtered = STAFF.filter((s) => s.name.toLowerCase().includes(search.toLowerCase()) || s.role.toLowerCase().includes(search.toLowerCase()) || s.initials.toLowerCase().includes(search.toLowerCase()));
  return (
    <div>
      <div style={{ position: "relative", marginBottom: 8 }}>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ position: "absolute", left: 10, top: 10, color: "#9ca3af" }}>
          <circle cx="6" cy="6" r="4.5" stroke="currentColor" strokeWidth="1.3" /><path d="M9.5 9.5L12.5 12.5" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" />
        </svg>
        <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Search by name or role..." style={{ width: "100%", padding: "8px 12px 8px 32px", border: "1.5px solid #d1d5db", borderRadius: 8, fontSize: 13, outline: "none", color: "#374151", fontFamily: "inherit", background: "#fff" }}
          onFocus={(e) => e.target.style.borderColor = "#2563eb"} onBlur={(e) => e.target.style.borderColor = "#d1d5db"} />
      </div>
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
        {filtered.map((s) => (
          <button key={s.id} onClick={() => onSelect(selected === s.id ? "" : s.id)} style={{
            display: "flex", alignItems: "center", gap: 6, padding: "6px 12px", borderRadius: 8, fontSize: 12, fontWeight: 500, cursor: "pointer",
            border: selected === s.id ? `2px solid ${s.color}` : "1.5px solid #d1d5db",
            background: selected === s.id ? `${s.color}08` : "#fff",
            color: selected === s.id ? s.color : "#374151", transition: "all 0.15s", fontFamily: "inherit",
          }}>
            <div style={{ width: 22, height: 22, borderRadius: "50%", background: `${s.color}15`, color: s.color, fontSize: 9, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center" }}>{s.initials}</div>
            <div style={{ textAlign: "left" }}>
              <div style={{ lineHeight: 1.2 }}>{s.name}</div>
              <div style={{ fontSize: 10, color: selected === s.id ? `${s.color}aa` : "#9ca3af", lineHeight: 1.2 }}>{s.role}</div>
            </div>
          </button>
        ))}
        {filtered.length === 0 && <span style={{ fontSize: 12, color: "#9ca3af", padding: 4 }}>No staff matching "{search}"</span>}
      </div>
    </div>
  );
}

function StaffDD({ cur, onSelect, onClose }) {
  const ref = useRef(null);
  useEffect(() => { function c(e) { if (ref.current && !ref.current.contains(e.target)) onClose(); } document.addEventListener("mousedown", c); return () => document.removeEventListener("mousedown", c); }, [onClose]);
  return (<div ref={ref} style={{ position: "absolute", top: "100%", right: 0, marginTop: 6, zIndex: 50, background: "#fff", border: "1px solid #e5e7eb", borderRadius: 10, boxShadow: "0 10px 40px rgba(0,0,0,0.12)", width: 220, overflow: "hidden" }}>
    <div style={{ padding: "8px 12px", fontSize: 11, fontWeight: 700, color: "#9ca3af", textTransform: "uppercase", letterSpacing: "0.05em", borderBottom: "1px solid #f3f4f6" }}>Assign to</div>
    {STAFF.map((s) => (<button key={s.id} onClick={(e) => { e.stopPropagation(); onSelect(s.id); }} style={{ display: "flex", alignItems: "center", gap: 10, width: "100%", padding: "8px 12px", background: cur === s.id ? "#eff6ff" : "transparent", border: "none", cursor: "pointer", fontSize: 13, color: "#374151", fontFamily: "inherit", textAlign: "left" }} onMouseEnter={(e) => e.currentTarget.style.background = "#f3f4f6"} onMouseLeave={(e) => e.currentTarget.style.background = cur === s.id ? "#eff6ff" : "transparent"}>
      <div style={{ width: 24, height: 24, borderRadius: "50%", background: `${s.color}12`, color: s.color, fontSize: 9, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center" }}>{s.initials}</div>
      <div><div style={{ fontWeight: 500 }}>{s.name}</div><div style={{ fontSize: 11, color: "#9ca3af" }}>{s.role}</div></div></button>))}
    {cur && <button onClick={(e) => { e.stopPropagation(); onSelect(null); }} style={{ width: "100%", padding: "8px 12px", background: "transparent", border: "none", borderTop: "1px solid #f3f4f6", color: "#dc2626", cursor: "pointer", fontSize: 12, textAlign: "left", fontFamily: "inherit" }}>Unassign</button>}
  </div>);
}

function StatusPill({ status }) {
  const m = { active: { c: "#059669", bg: "#f0fdf4", bd: "#bbf7d0", l: "Active" }, on_hold: { c: "#d97706", bg: "#fffbeb", bd: "#fde68a", l: "On Hold" }, locked: { c: "#dc2626", bg: "#fef2f2", bd: "#fecaca", l: "\u{1F512} Locked" }, completed: { c: "#2563eb", bg: "#eff6ff", bd: "#bfdbfe", l: "Completed" }, cancelled: { c: "#6b7280", bg: "#f3f4f6", bd: "#e5e7eb", l: "Cancelled" } }[status] || { c: "#6b7280", bg: "#f3f4f6", bd: "#e5e7eb", l: status };
  return <span style={{ fontSize: 12, fontWeight: 700, color: m.c, background: m.bg, border: `1px solid ${m.bd}`, padding: "4px 12px", borderRadius: 20, textTransform: "uppercase", letterSpacing: "0.04em" }}>{m.l}</span>;
}

function ProgressRing({ pct }) { return (<div style={{ position: "relative", width: 56, height: 56 }}><svg width="56" height="56" viewBox="0 0 56 56"><circle cx="28" cy="28" r="24" fill="none" stroke="#e5e7eb" strokeWidth="4" /><circle cx="28" cy="28" r="24" fill="none" stroke="#2563eb" strokeWidth="4" strokeLinecap="round" strokeDasharray={`${pct * 1.508} 150.8`} transform="rotate(-90 28 28)" style={{ transition: "stroke-dasharray 0.5s ease" }} /></svg><div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, fontWeight: 700, color: "#111827" }}>{pct}%</div></div>); }
function MD({ l, v }) { return <div><div style={{ fontSize: 11, fontWeight: 600, color: "#6b7280", textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 2 }}>{l}</div><div style={{ fontSize: 13, fontWeight: 600, color: "#111827" }}>{v}</div></div>; }
function PBtn({ label, onClick }) { return <button onClick={(e) => { e.stopPropagation(); onClick(); }} style={{ padding: "8px 18px", background: "#2563eb", border: "none", borderRadius: 8, color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", boxShadow: "0 1px 3px rgba(37,99,235,0.2)" }}>{label}</button>; }
function GBtn({ label, c, onClick }) { return <button onClick={(e) => { e.stopPropagation(); onClick(); }} style={{ padding: "8px 14px", background: `${c}08`, border: `1px solid ${c}22`, borderRadius: 8, color: c, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>{label}</button>; }
function LF({ label, children }) { return <div style={{ marginBottom: 14 }}><label style={{ display: "block", fontSize: 11, fontWeight: 600, color: "#6b7280", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 5 }}>{label}</label>{children}</div>; }

function Div() { return <div style={{ height: 1, background: "#e5e7eb", margin: "14px 0" }} />; }
function SR({ l, v }) { return <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 7, gap: 12 }}><span style={{ fontSize: 12, color: "#9ca3af", flexShrink: 0 }}>{l}</span><span style={{ fontSize: 12, color: "#374151", fontWeight: 500, textAlign: "right", wordBreak: "break-word" }}>{v}</span></div>; }
function SC({ l, a, c, bg }) { return <div style={{ padding: "18px 20px", background: bg, borderRadius: 12, border: "1px solid #e5e7eb" }}><div style={{ fontSize: 11, fontWeight: 700, color: "#6b7280", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 6 }}>{l}</div><div style={{ fontSize: 22, fontWeight: 700, color: c, fontFamily: "monospace" }}>${a.toLocaleString("en-US", { minimumFractionDigits: 2 })}</div></div>; }
const sel = { width: "100%", padding: "9px 12px", background: "#fff", border: "1px solid #d1d5db", borderRadius: 8, color: "#111827", fontSize: 13, fontWeight: 500, outline: "none", cursor: "pointer", fontFamily: "inherit", appearance: "none", backgroundImage: `url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%239ca3af' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E")`, backgroundRepeat: "no-repeat", backgroundPosition: "right 12px center" };

  const [order, setOrder] = useState(() => buildOrder("Foreclosure Lawsuit Package"));
  const [savedSnapshot, setSavedSnapshot] = useState(() => JSON.stringify(buildOrder("Foreclosure Lawsuit Package")));
  const [activeTab, setActiveTab] = useState("workflow");
  const [expandedNode, setExpandedNode] = useState(null);
  const [completingNode, setCompletingNode] = useState(null);
  const [completionNotes, setCompletionNotes] = useState("");
  const [completionAssignee, setCompletionAssignee] = useState("");
  const [staffDropdownNode, setStaffDropdownNode] = useState(null);
  const [addingStepAt, setAddingStepAt] = useState(null);
  const [newStepName, setNewStepName] = useState("");
  const [toast, setToast] = useState(null);
  const [confirmDialog, setConfirmDialog] = useState(null);
  const staffRef = useRef(null);
  const addRef = useRef(null);
  const completionRef = useRef(null);
  const typeRef = useRef(null);
  const [typeDropdownOpen, setTypeDropdownOpen] = useState(false);

  const isLocked = order.status === "locked";
  const hasUnsavedChanges = JSON.stringify(order) !== savedSnapshot;

  useEffect(() => {
    function click(e) {
      if (staffRef.current && !staffRef.current.contains(e.target)) setStaffDropdownNode(null);
      if (typeRef.current && !typeRef.current.contains(e.target)) setTypeDropdownOpen(false);
    }
    document.addEventListener("mousedown", click);
    return () => document.removeEventListener("mousedown", click);
  }, []);
  useEffect(() => { if (addRef.current) addRef.current.focus(); }, [addingStepAt]);
  useEffect(() => { if (completionRef.current) completionRef.current.focus(); }, [completingNode]);

  function showToast(message, type = "success") { setToast({ message, type }); }

  function switchOrderType(type) {
    setSelectedType(type); const o = buildOrder(type); setOrder(o); setSavedSnapshot(JSON.stringify(o));
    setExpandedNode(null); setCompletingNode(null); setActiveTab("workflow"); setTypeDropdownOpen(false);
  }

  function handleSave() {
    setSavedSnapshot(JSON.stringify(order));
    showToast("Changes saved successfully", "success");
    addHistoryEntry("Order saved", getStaff(order.caseManager)?.name || "Staff", "");
  }

  function handleCancel() {
    if (!hasUnsavedChanges) { showToast("No changes to discard", "warning"); return; }
    setConfirmDialog({
      title: "Discard unsaved changes?",
      message: "You have unsaved changes to this order. Are you sure you want to discard them? This cannot be undone.",
      confirmLabel: "Discard Changes",
      confirmColor: "#dc2626",
      onConfirm: () => { setOrder(JSON.parse(savedSnapshot)); setConfirmDialog(null); showToast("Changes discarded", "warning"); setExpandedNode(null); setCompletingNode(null); },
      onCancel: () => setConfirmDialog(null),
    });
  }

  function handleUnlock() {
    setOrder((p) => ({ ...p, status: "active" }));
    addHistoryEntry("Order unlocked", getStaff(order.caseManager)?.name || "Staff", "Order status changed from Locked to Active");
    showToast("Order unlocked", "success");
  }

  let nextUpId = null;
  for (const stage of order.stages) {
    const ip = stage.nodes.findIndex((n) => n.status === "in_progress");
    if (ip !== -1) {
      const after = stage.nodes.slice(ip + 1).find((n) => n.status === "not_started");
      if (after) { nextUpId = after.id; break; }
      const si = order.stages.indexOf(stage);
      for (let s = si + 1; s < order.stages.length; s++) { const f = order.stages[s].nodes.find((n) => n.status === "not_started"); if (f) { nextUpId = f.id; break; } }
      break;
    }
  }

  function updateNode(nodeId, updates) {
    setOrder((prev) => { const o = JSON.parse(JSON.stringify(prev)); for (const s of o.stages) { const n = s.nodes.find((x) => x.id === nodeId); if (n) { Object.assign(n, updates); break; } } return o; });
  }
  function addHistoryEntry(action, user, detail) {
    setOrder((prev) => { const o = JSON.parse(JSON.stringify(prev)); o.history.unshift({ id: `h_${Date.now()}_${Math.random()}`, date: "10/25/25", time: new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" }), action, user, detail: detail || "" }); return o; });
  }

  function handleCompleteAndAdvance(nodeId) {
    let theNode = null;
    for (const s of order.stages) { const n = s.nodes.find((x) => x.id === nodeId); if (n) { theNode = n; break; } }
    if (!theNode) return;
    const cStaff = getStaff(theNode.assignee);
    updateNode(nodeId, { status: "completed", completedAt: "10/25/25", completedBy: theNode.assignee, completionNotes: completionNotes.trim() });
    addHistoryEntry(`${theNode.label} completed`, cStaff?.name || "Unknown", completionNotes.trim());
    if (nextUpId && completionAssignee) {
      updateNode(nextUpId, { assignee: completionAssignee, status: "in_progress", startedAt: "10/25/25" });
      const ns = getStaff(completionAssignee);
      let nl = ""; for (const st of order.stages) { const nn = st.nodes.find((n) => n.id === nextUpId); if (nn) { nl = nn.label; break; } }
      addHistoryEntry(`${nl} assigned and started`, cStaff?.name || "Unknown", `Assigned to ${ns?.name || "Unknown"}`);
    }
    setCompletingNode(null); setCompletionNotes(""); setCompletionAssignee(""); setExpandedNode(null);
    showToast(`"${theNode.label}" completed`, "success");
  }

  function handleReopenStep(nodeId) {
    let theNode = null;
    for (const s of order.stages) { const n = s.nodes.find((x) => x.id === nodeId); if (n) { theNode = n; break; } }
    if (!theNode) return;
    const prevNotes = theNode.completionNotes;
    const prevBy = getStaff(theNode.completedBy)?.name || "Unknown";
    updateNode(nodeId, { status: "in_progress", completedAt: null, completedBy: null, completionNotes: "", startedAt: "10/25/25" });
    addHistoryEntry(`${theNode.label} reopened`, getStaff(order.caseManager)?.name || "Staff", `Previously completed by ${prevBy}. Original notes: ${prevNotes || "(none)"}`);
    setExpandedNode(nodeId);
    showToast(`"${theNode.label}" reopened`, "warning");
  }

  function addStep(si, ni) {
    if (!newStepName.trim()) return;
    const label = newStepName.trim();
    setOrder((prev) => { const o = JSON.parse(JSON.stringify(prev)); o.stages[si].nodes.splice(ni + 1, 0, { id: `add_${Date.now()}`, label, status: "not_started", assignee: null, completedAt: null, startedAt: null, completedBy: null, completionNotes: "", isAddon: true }); return o; });
    addHistoryEntry(`Step "${label}" added`, getStaff(order.caseManager)?.name || "Staff", `Added to ${order.stages[si].name}`);
    setNewStepName(""); setAddingStepAt(null);
  }

  function stageStatus(stage) {
    const done = stage.nodes.filter((n) => n.status === "completed" || n.status === "skipped").length;
    if (done === stage.nodes.length) return "completed";
    if (stage.nodes.some((n) => n.status === "in_progress") || done > 0) return "active";
    return "upcoming";
  }

  const totalNodes = order.stages.reduce((a, s) => a + s.nodes.length, 0);
  const completedNodes = order.stages.reduce((a, s) => a + s.nodes.filter((n) => n.status === "completed" || n.status === "skipped").length, 0);
  const progressPct = totalNodes > 0 ? Math.round((completedNodes / totalNodes) * 100) : 0;
  const paidPct = order.contractAmount > 0 ? Math.round((order.paidAmount / order.contractAmount) * 100) : 0;
  const tabStyle = (key) => ({ padding: "14px 20px", background: "none", border: "none", borderBottom: activeTab === key ? "2px solid #2563eb" : "2px solid transparent", color: activeTab === key ? "#111827" : "#9ca3af", fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" });
  const totalStepsForType = ORDER_TEMPLATES[selectedType]?.reduce((a, s) => a + s.steps.length, 0) || 0;
  const totalStagesForType = ORDER_TEMPLATES[selectedType]?.length || 0;

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.35)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, fontFamily: "'Inter', -apple-system, sans-serif" }}>
      {toast && <Toast message={toast.message} type={toast.type} onDone={() => setToast(null)} />}
      {confirmDialog && <ConfirmDialog {...confirmDialog} />}

      <div style={{ width: "92%", maxWidth: 1400, height: "92vh", background: "#fff", borderRadius: 16, display: "flex", flexDirection: "column", boxShadow: "0 25px 60px rgba(0,0,0,0.15)", animation: "modalIn 0.25s ease", overflow: "hidden", ...(isLocked ? { outline: "3px solid #dc2626", outlineOffset: -3 } : {}) }}>

        {isLocked && (
          <div style={{ background: "#fef2f2", borderBottom: "1px solid #fecaca", padding: "10px 28px", display: "flex", alignItems: "center", gap: 10 }}>
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="3" y="8" width="12" height="8" rx="2" stroke="#dc2626" strokeWidth="1.6" fill="#dc262610" /><path d="M6 8V5.5C6 3.84 7.34 2.5 9 2.5C10.66 2.5 12 3.84 12 5.5V8" stroke="#dc2626" strokeWidth="1.6" strokeLinecap="round" /></svg>
            <span style={{ fontSize: 13, fontWeight: 700, color: "#dc2626" }}>ORDER LOCKED</span>
            <span style={{ fontSize: 13, color: "#991b1b", flex: 1 }}>— Workflow progression is disabled due to non-payment.</span>
            <button onClick={handleUnlock} style={{ padding: "6px 16px", background: "#fff", border: "1.5px solid #dc2626", borderRadius: 8, color: "#dc2626", fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 6 }}>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="6" width="10" height="6.5" rx="1.5" stroke="#dc2626" strokeWidth="1.3" /><path d="M4.5 6V4C4.5 2.62 5.62 1.5 7 1.5C8.1 1.5 9 2.2 9.3 3.2" stroke="#dc2626" strokeWidth="1.3" strokeLinecap="round" /></svg>
              Unlock Order
            </button>
          </div>
        )}

        {/* HEADER */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px 28px", borderBottom: "1px solid #e5e7eb" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
            <h2 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: "#111827" }}>{order.client}</h2>
            <span style={{ color: "#d1d5db", fontSize: 18 }}>·</span>
            <div style={{ position: "relative" }} ref={typeRef}>
              <button onClick={() => setTypeDropdownOpen(!typeDropdownOpen)} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 14px", background: typeDropdownOpen ? "#eff6ff" : "#f3f4f6", border: `1.5px solid ${typeDropdownOpen ? "#2563eb" : "#e5e7eb"}`, borderRadius: 8, cursor: "pointer", fontSize: 14, fontWeight: 600, color: typeDropdownOpen ? "#2563eb" : "#374151", fontFamily: "inherit" }}>
                {selectedType}
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style={{ transform: typeDropdownOpen ? "rotate(180deg)" : "rotate(0)", transition: "transform 0.2s" }}><path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" /></svg>
              </button>
              {typeDropdownOpen && (
                <div style={{ position: "absolute", top: "100%", left: 0, marginTop: 6, zIndex: 200, background: "#fff", border: "1px solid #e5e7eb", borderRadius: 12, boxShadow: "0 12px 48px rgba(0,0,0,0.15)", width: 320, overflow: "hidden", animation: "fadeIn 0.15s" }}>
                  <div style={{ padding: "10px 14px", borderBottom: "1px solid #f3f4f6", fontSize: 11, fontWeight: 700, color: "#9ca3af", textTransform: "uppercase", letterSpacing: "0.06em" }}>Switch Order Type</div>
                  <div style={{ maxHeight: 360, overflowY: "auto" }}>
                    {Object.keys(ORDER_TEMPLATES).map((name) => {
                      const t = ORDER_TEMPLATES[name]; const steps = t.reduce((a, s) => a + s.steps.length, 0); const isCur = name === selectedType;
                      return (
                        <button key={name} onClick={() => switchOrderType(name)} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", width: "100%", padding: "10px 14px", background: isCur ? "#eff6ff" : "transparent", border: "none", cursor: "pointer", fontSize: 13, color: "#374151", fontFamily: "inherit", textAlign: "left", borderLeft: isCur ? "3px solid #2563eb" : "3px solid transparent" }}
                          onMouseEnter={(e) => { if (!isCur) e.currentTarget.style.background = "#f9fafb"; }} onMouseLeave={(e) => { if (!isCur) e.currentTarget.style.background = isCur ? "#eff6ff" : "transparent"; }}>
                          <div><div style={{ fontWeight: isCur ? 700 : 500, color: isCur ? "#2563eb" : "#374151" }}>{name}</div><div style={{ fontSize: 11, color: "#9ca3af", marginTop: 2 }}>{t.length} stages · {steps} steps</div></div>
                          {isCur && <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 8L7 11L12 5" stroke="#2563eb" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" /></svg>}
                        </button>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
            <span style={{ fontSize: 12, color: "#9ca3af", fontFamily: "monospace" }}>{order.id}</span>
            <span style={{ fontSize: 11, color: "#9ca3af", background: "#f3f4f6", padding: "3px 8px", borderRadius: 6 }}>{totalStagesForType} stages · {totalStepsForType} steps</span>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            {hasUnsavedChanges && <span style={{ fontSize: 11, color: "#d97706", fontWeight: 600, background: "#fffbeb", padding: "3px 10px", borderRadius: 20 }}>● Unsaved</span>}
            <StatusPill status={order.status} />
            <button style={{ width: 32, height: 32, borderRadius: 8, border: "1px solid #e5e7eb", background: "#fff", color: "#6b7280", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}
              onClick={handleCancel}>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 3L11 11M11 3L3 11" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" /></svg>
            </button>
          </div>
        </div>

        {/* BODY */}
        <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>
          {/* LEFT */}
          <div style={{ width: 296, flexShrink: 0, borderRight: "1px solid #e5e7eb", overflowY: "auto", padding: "20px 22px", background: "#fafbfc" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 22, ...(isLocked ? { opacity: 0.5 } : {}) }}>
              <ProgressRing pct={progressPct} />
              <div><div style={{ fontSize: 14, fontWeight: 700, color: "#111827" }}>{completedNodes}/{totalNodes} steps</div><div style={{ fontSize: 12, color: "#6b7280" }}>completed</div></div>
            </div>
            <LF label="Status"><select value={order.status} onChange={(e) => setOrder((p) => ({ ...p, status: e.target.value }))} style={sel}><option value="active">Active</option><option value="on_hold">On Hold</option><option value="locked">{"\u{1F512}"} Locked</option><option value="completed">Completed</option><option value="cancelled">Cancelled</option></select></LF>
            <LF label="Case Manager"><select value={order.caseManager} onChange={(e) => setOrder((p) => ({ ...p, caseManager: e.target.value }))} style={sel}>{STAFF.map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}</select></LF>
            <Div /><Fld label="Client" value={order.client} /><Fld label="Contract" value={`$${order.contractAmount.toLocaleString("en-US", { minimumFractionDigits: 2 })}`} /><Fld label="Service Fee" value={`$${order.serviceFee.toLocaleString("en-US", { minimumFractionDigits: 2 })}`} />
            <LF label="Paid"><div style={{ display: "flex", alignItems: "baseline", gap: 6 }}><span style={{ fontSize: 16, fontWeight: 700, color: "#059669" }}>${order.paidAmount.toLocaleString("en-US", { minimumFractionDigits: 2 })}</span><span style={{ fontSize: 11, color: "#9ca3af" }}>of ${order.contractAmount.toLocaleString("en-US", { minimumFractionDigits: 2 })}</span></div><div style={{ height: 4, background: "#e5e7eb", borderRadius: 2, marginTop: 6, overflow: "hidden" }}><div style={{ height: "100%", width: `${paidPct}%`, background: "#059669", borderRadius: 2 }} /></div></LF>
            <Fld label="Created" value={order.created} /><Div />
            <div style={{ fontSize: 11, fontWeight: 700, color: "#6b7280", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 10 }}>Property & Loan</div>
            <SR l="SSN" v={order.ssn} /><SR l="DOB" v={order.dob} /><SR l="Lender" v={order.lender} /><SR l="Loan #" v={order.loanNumber} /><SR l="Property" v={order.property} />
          </div>

          {/* RIGHT */}
          <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
            <div style={{ display: "flex", borderBottom: "1px solid #e5e7eb", padding: "0 28px" }}>
              <button style={tabStyle("workflow")} onClick={() => setActiveTab("workflow")}>Workflow</button>
              <button style={tabStyle("payments")} onClick={() => setActiveTab("payments")}>Payments</button>
              <button style={tabStyle("history")} onClick={() => setActiveTab("history")}>Order History</button>
            </div>
            <div style={{ flex: 1, overflowY: "auto", padding: "24px 28px" }}>

              {activeTab === "workflow" && (
                <div style={{ maxWidth: 880, ...(isLocked ? { opacity: 0.5, pointerEvents: "none", filter: "grayscale(0.6)" } : {}) }}>
                  {order.stages.map((stage, si) => {
                    const ss = stageStatus(stage); const done = stage.nodes.filter((n) => n.status === "completed" || n.status === "skipped").length; const isLast = si === order.stages.length - 1;
                    return (
                      <div key={`${selectedType}-${si}`} style={{ display: "flex" }}>
                        <div style={{ width: 44, display: "flex", flexDirection: "column", alignItems: "center", flexShrink: 0 }}>
                          <div style={{ width: 32, height: 32, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, background: ss === "completed" ? "#059669" : ss === "active" ? "#2563eb" : "#e5e7eb", color: ss === "upcoming" ? "#9ca3af" : "#fff", fontSize: 13, fontWeight: 700, ...(ss === "active" ? { animation: "pulse 2s infinite" } : {}) }}>
                            {ss === "completed" ? <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7L6 10L11 4" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" /></svg> : <span>{si + 1}</span>}
                          </div>
                          {!isLast && <div style={{ width: 2, flex: 1, minHeight: 16, background: ss === "completed" ? "#059669" : "#e5e7eb" }} />}
                        </div>
                        <div style={{ flex: 1, paddingBottom: isLast ? 0 : 4, paddingTop: 3 }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                            <h3 style={{ margin: 0, fontSize: 15, fontWeight: 700, color: "#111827" }}>{stage.name}</h3>
                            <span style={{ fontSize: 12, fontWeight: 600, color: ss === "completed" ? "#059669" : ss === "active" ? "#2563eb" : "#9ca3af", background: ss === "completed" ? "#05966910" : ss === "active" ? "#2563eb10" : "#f3f4f6", padding: "2px 10px", borderRadius: 20 }}>{done}/{stage.nodes.length}</span>
                          </div>
                          <div style={{ display: "flex", flexDirection: "column", gap: 3, marginBottom: 10 }}>
                            {stage.nodes.map((node, ni) => {
                              const isExp = expandedNode === node.id; const isNext = node.id === nextUpId; const isComp = completingNode === node.id;
                              const staff = getStaff(node.assignee); const cbStaff = getStaff(node.completedBy);
                              const sc = { completed: { bg: "#f0fdf4", bd: "#bbf7d0", dot: "#059669" }, in_progress: { bg: "#eff6ff", bd: "#bfdbfe", dot: "#2563eb" }, not_started: { bg: "#fff", bd: "#e5e7eb", dot: "#d1d5db" }, skipped: { bg: "#f9fafb", bd: "#e5e7eb", dot: "#d1d5db" }, blocked: { bg: "#fef2f2", bd: "#fecaca", dot: "#dc2626" } }[node.status];
                              return (
                                <div key={node.id}>
                                  <div onClick={() => { if (!isComp) setExpandedNode(isExp ? null : node.id); }}
                                    style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 14px", borderRadius: 10, background: isExp ? sc.bg : "#fff", border: `1.5px solid ${isExp ? sc.bd : isNext ? "#f59e0b" : "#f0f0f0"}`, cursor: "pointer", transition: "all 0.15s", ...(isNext && !isExp ? { boxShadow: "0 0 0 3px rgba(245,158,11,0.1)" } : {}) }}
                                    onMouseEnter={(e) => { if (!isExp) { e.currentTarget.style.background = "#fafbfc"; e.currentTarget.style.borderColor = sc.bd; } }}
                                    onMouseLeave={(e) => { if (!isExp) { e.currentTarget.style.background = "#fff"; e.currentTarget.style.borderColor = isNext ? "#f59e0b" : "#f0f0f0"; } }}>
                                    <div style={{ width: 22, height: 22, borderRadius: "50%", border: `2px solid ${sc.dot}`, background: node.status === "completed" ? sc.dot : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, ...(node.status === "in_progress" ? { boxShadow: `0 0 0 3px ${sc.dot}15` } : {}) }}>
                                      {node.status === "completed" && <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2.5 6L5 8.5L9.5 3.5" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" /></svg>}
                                      {node.status === "in_progress" && <div style={{ width: 7, height: 7, borderRadius: "50%", background: sc.dot }} />}
                                      {node.status === "blocked" && <span style={{ fontSize: 10, fontWeight: 800, color: sc.dot }}>!</span>}
                                    </div>
                                    <div style={{ flex: 1, minWidth: 0 }}>
                                      <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                                        <span style={{ fontSize: 14, fontWeight: 500, color: node.status === "completed" ? "#6b7280" : node.status === "skipped" ? "#9ca3af" : "#111827", ...(node.status === "skipped" ? { textDecoration: "line-through" } : {}) }}>{node.label}</span>
                                        {isNext && <span style={{ fontSize: 10, fontWeight: 700, color: "#d97706", background: "#fef3c7", padding: "2px 7px", borderRadius: 4, textTransform: "uppercase" }}>Next</span>}
                                        {node.isAddon && <span style={{ fontSize: 10, fontWeight: 600, color: "#7c3aed", background: "#f5f3ff", padding: "2px 7px", borderRadius: 4 }}>Added</span>}
                                        {node.status === "blocked" && <span style={{ fontSize: 10, fontWeight: 700, color: "#dc2626", background: "#fef2f2", padding: "2px 7px", borderRadius: 4, textTransform: "uppercase" }}>Blocked</span>}
                                      </div>
                                      {node.status === "completed" && cbStaff && <span style={{ fontSize: 11, color: "#9ca3af", display: "block", marginTop: 2 }}>{cbStaff.name} · {node.completedAt}</span>}
                                      {node.status === "in_progress" && <span style={{ fontSize: 11, color: "#2563eb", display: "block", marginTop: 2 }}>{staff?.name || "Unassigned"} · Started {node.startedAt}</span>}
                                    </div>
                                    {node.status !== "completed" && (
                                      <div style={{ position: "relative", flexShrink: 0 }} ref={staffDropdownNode === node.id ? staffRef : null}>
                                        {staff ? <button onClick={(e) => { e.stopPropagation(); setStaffDropdownNode(staffDropdownNode === node.id ? null : node.id); }} title={staff.name} style={{ width: 28, height: 28, borderRadius: "50%", border: "none", background: `${staff.color}12`, color: staff.color, fontSize: 10, fontWeight: 700, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>{staff.initials}</button>
                                          : <button onClick={(e) => { e.stopPropagation(); setStaffDropdownNode(staffDropdownNode === node.id ? null : node.id); }} style={{ width: 28, height: 28, borderRadius: "50%", border: "1.5px dashed #d1d5db", background: "transparent", color: "#9ca3af", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", padding: 0 }}><svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M6 2.5V9.5M2.5 6H9.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" /></svg></button>}
                                        {staffDropdownNode === node.id && <StaffDD cur={node.assignee} onSelect={(sid) => { updateNode(node.id, { assignee: sid }); setStaffDropdownNode(null); }} onClose={() => setStaffDropdownNode(null)} />}
                                      </div>
                                    )}
                                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ color: "#d1d5db", transition: "transform 0.2s", transform: isExp ? "rotate(180deg)" : "rotate(0)", flexShrink: 0 }}><path d="M3.5 5.25L7 8.75L10.5 5.25" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" /></svg>
                                  </div>

                                  {isExp && node.status === "completed" && (
                                    <div style={{ margin: "0 0 4px", padding: "14px 16px 14px 48px", background: "#f0fdf4", borderRadius: "0 0 10px 10px", border: "1.5px solid #bbf7d0", borderTop: "none", animation: "fadeIn 0.15s" }}>
                                      <div style={{ display: "flex", gap: 20, flexWrap: "wrap", marginBottom: node.completionNotes ? 12 : 10 }}>
                                        <MD l="Completed by" v={cbStaff?.name || "—"} /><MD l="Date" v={node.completedAt || "—"} /><MD l="Started" v={node.startedAt || "—"} />
                                      </div>
                                      {node.completionNotes && <div style={{ marginBottom: 12 }}><div style={{ fontSize: 11, fontWeight: 600, color: "#6b7280", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 4 }}>Notes</div><div style={{ padding: "10px 14px", background: "#fff", borderRadius: 8, border: "1px solid #d1fae5", fontSize: 13, color: "#374151", lineHeight: 1.5 }}>{node.completionNotes}</div></div>}
                                      <button onClick={(e) => { e.stopPropagation(); handleReopenStep(node.id); }} style={{ display: "flex", alignItems: "center", gap: 6, padding: "7px 14px", background: "#fffbeb", border: "1.5px solid #fde68a", borderRadius: 8, color: "#d97706", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                                        <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2 7C2 4.24 4.24 2 7 2C9.76 2 12 4.24 12 7C12 9.76 9.76 12 7 12" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" /><path d="M4.5 7L2 4.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" /><path d="M2 7.5L2 4.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" /></svg>
                                        Reopen Step
                                      </button>
                                    </div>
                                  )}

                                  {isExp && node.status === "in_progress" && !isComp && (
                                    <div style={{ margin: "0 0 4px", padding: "14px 16px 14px 48px", background: "#eff6ff", borderRadius: "0 0 10px 10px", border: "1.5px solid #bfdbfe", borderTop: "none", animation: "fadeIn 0.15s" }}>
                                      <div style={{ display: "flex", gap: 20, marginBottom: 14, flexWrap: "wrap" }}><MD l="Assigned to" v={staff?.name || "Unassigned"} /><MD l="Started" v={node.startedAt || "—"} /></div>
                                      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                                        <PBtn label="Complete & Advance →" onClick={() => { setCompletingNode(node.id); setCompletionNotes(""); setCompletionAssignee(""); }} />
                                      </div>
                                    </div>
                                  )}

                                  {isExp && isComp && (
                                    <div style={{ margin: "0 0 4px", padding: "18px 18px 18px 48px", background: "#f0fdf4", borderRadius: "0 0 10px 10px", border: "1.5px solid #86efac", borderTop: "none", animation: "fadeIn 0.15s" }}>
                                      <div style={{ fontSize: 14, fontWeight: 700, color: "#065f46", marginBottom: 14, display: "flex", alignItems: "center", gap: 8 }}>
                                        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="8" stroke="#059669" strokeWidth="1.6" /><path d="M5.5 9L8 11.5L12.5 6.5" stroke="#059669" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" /></svg>
                                        Complete: {node.label}
                                      </div>
                                      <div style={{ marginBottom: 14 }}>
                                        <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#374151", marginBottom: 5 }}>Completion Notes</label>
                                        <textarea ref={completionRef} value={completionNotes} onChange={(e) => setCompletionNotes(e.target.value)} placeholder="What was done? Any details for the next person..." rows={3}
                                          style={{ width: "100%", background: "#fff", border: "1.5px solid #86efac", borderRadius: 8, padding: "10px 14px", fontSize: 13, color: "#374151", resize: "vertical", outline: "none", fontFamily: "inherit", lineHeight: 1.5 }}
                                          onFocus={(e) => e.target.style.borderColor = "#059669"} onBlur={(e) => e.target.style.borderColor = "#86efac"} />
                                      </div>
                                      {nextUpId && (
                                        <div style={{ marginBottom: 16 }}>
                                          <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#374151", marginBottom: 8 }}>
                                            Assign next step to
                                            {(() => { let nl = ""; for (const st of order.stages) { const nn = st.nodes.find((n) => n.id === nextUpId); if (nn) { nl = nn.label; break; } } return nl ? <span style={{ fontWeight: 400, color: "#6b7280" }}> — {nl}</span> : null; })()}
                                          </label>
                                          <StaffSearchPicker selected={completionAssignee} onSelect={setCompletionAssignee} />
                                        </div>
                                      )}
                                      <div style={{ display: "flex", gap: 8 }}>
                                        <button onClick={() => handleCompleteAndAdvance(node.id)} style={{ padding: "10px 24px", background: "#059669", border: "none", borderRadius: 8, color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", boxShadow: "0 1px 3px rgba(5,150,105,0.3)" }}>✓ Complete Step</button>
                                        <button onClick={() => { setCompletingNode(null); setCompletionNotes(""); setCompletionAssignee(""); }} style={{ padding: "10px 18px", background: "#fff", border: "1px solid #d1d5db", borderRadius: 8, color: "#6b7280", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                                      </div>
                                    </div>
                                  )}

                                  {isExp && (node.status === "not_started" || node.status === "blocked" || node.status === "skipped") && (
                                    <div style={{ margin: "0 0 4px", padding: "14px 16px 14px 48px", background: node.status === "blocked" ? "#fef2f2" : "#f9fafb", borderRadius: "0 0 10px 10px", border: `1.5px solid ${node.status === "blocked" ? "#fecaca" : "#e5e7eb"}`, borderTop: "none", animation: "fadeIn 0.15s" }}>
                                      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                                        {(node.status === "not_started" || node.status === "blocked") && <PBtn label="Start Step" onClick={() => { updateNode(node.id, { status: "in_progress", startedAt: "10/25/25" }); addHistoryEntry(`${node.label} started`, staff?.name || "Staff", ""); }} />}
                                        {node.status === "not_started" && <GBtn label="Skip" c="#6b7280" onClick={() => { updateNode(node.id, { status: "skipped" }); addHistoryEntry(`${node.label} skipped`, "Staff", ""); setExpandedNode(null); }} />}
                                        {(node.status === "blocked" || node.status === "skipped") && <GBtn label="Reopen" c="#d97706" onClick={() => { updateNode(node.id, { status: "not_started", completedAt: null }); addHistoryEntry(`${node.label} reopened`, "Staff", ""); }} />}
                                      </div>
                                    </div>
                                  )}

                                  {addingStepAt?.si === si && addingStepAt?.ni === ni ? (
                                    <div style={{ display: "flex", gap: 8, padding: "6px 0 6px 34px", alignItems: "center", animation: "fadeIn 0.15s" }}>
                                      <div style={{ width: 22, height: 22, borderRadius: "50%", border: "2px dashed #7c3aed", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><svg width="9" height="9" viewBox="0 0 10 10" fill="none"><path d="M5 2V8M2 5H8" stroke="#7c3aed" strokeWidth="1.5" strokeLinecap="round" /></svg></div>
                                      <input ref={addRef} value={newStepName} onChange={(e) => setNewStepName(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") addStep(si, ni); if (e.key === "Escape") { setAddingStepAt(null); setNewStepName(""); } }} placeholder="New step name..." style={{ flex: 1, padding: "7px 12px", border: "1.5px solid #7c3aed", borderRadius: 8, fontSize: 13, outline: "none", color: "#374151", background: "#faf5ff", fontFamily: "inherit" }} />
                                      <button onClick={() => addStep(si, ni)} style={{ padding: "6px 14px", background: "#7c3aed", border: "none", borderRadius: 8, color: "#fff", fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Add</button>
                                      <button onClick={() => { setAddingStepAt(null); setNewStepName(""); }} style={{ padding: "6px 10px", background: "#f3f4f6", border: "none", borderRadius: 8, color: "#6b7280", fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                                    </div>
                                  ) : (
                                    <div style={{ padding: "0 0 0 34px", height: 6, position: "relative" }} onMouseEnter={(e) => { const b = e.currentTarget.querySelector(".ab"); if (b) b.style.opacity = 1; }} onMouseLeave={(e) => { const b = e.currentTarget.querySelector(".ab"); if (b) b.style.opacity = 0; }}>
                                      <button className="ab" onClick={() => setAddingStepAt({ si, ni })} style={{ position: "absolute", top: -6, left: 34, opacity: 0, transition: "opacity 0.15s", display: "flex", alignItems: "center", gap: 4, padding: "2px 8px", background: "#f5f3ff", border: "1px solid #ddd6fe", borderRadius: 6, color: "#7c3aed", fontSize: 11, fontWeight: 600, cursor: "pointer", zIndex: 5, fontFamily: "inherit" }}>
                                        <svg width="9" height="9" viewBox="0 0 10 10" fill="none"><path d="M5 2V8M2 5H8" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" /></svg>Insert step
                                      </button>
                                    </div>
                                  )}
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              {activeTab === "payments" && (
                <div style={{ maxWidth: 880 }}>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 14, marginBottom: 28 }}>
                    <SC l="Contract Total" a={order.contractAmount} c="#111827" bg="#f9fafb" /><SC l="Amount Paid" a={order.paidAmount} c="#059669" bg="#f0fdf4" /><SC l="Remaining" a={order.contractAmount - order.paidAmount} c="#d97706" bg="#fffbeb" />
                  </div>
                  <div style={{ borderRadius: 12, border: "1px solid #e5e7eb", overflow: "hidden" }}>
                    <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                      <thead><tr style={{ background: "#f9fafb" }}>{["Date", "Description", "Method", "Amount", "Status"].map((h) => <th key={h} style={{ padding: "10px 16px", textAlign: "left", fontSize: 11, fontWeight: 700, color: "#6b7280", textTransform: "uppercase", letterSpacing: "0.05em", borderBottom: "1px solid #e5e7eb" }}>{h}</th>)}</tr></thead>
                      <tbody>{order.payments.map((p) => (<tr key={p.id} style={{ borderBottom: "1px solid #f3f4f6" }}><td style={{ padding: "12px 16px", color: "#6b7280" }}>{p.date}</td><td style={{ padding: "12px 16px", color: "#374151", fontWeight: 500 }}>{p.note}</td><td style={{ padding: "12px 16px", color: "#6b7280" }}>{p.method}</td><td style={{ padding: "12px 16px", fontWeight: 600, color: "#111827", fontFamily: "monospace" }}>${p.amount.toFixed(2)}</td><td style={{ padding: "12px 16px" }}><span style={{ fontSize: 11, fontWeight: 600, padding: "3px 10px", borderRadius: 20, ...(p.status === "paid" ? { color: "#059669", background: "#f0fdf4" } : { color: "#d97706", background: "#fffbeb" }) }}>{p.status === "paid" ? "Paid" : "Scheduled"}</span></td></tr>))}</tbody>
                    </table>
                  </div>
                </div>
              )}

              {activeTab === "history" && (
                <div style={{ maxWidth: 880 }}><div style={{ position: "relative", paddingLeft: 24 }}><div style={{ position: "absolute", left: 7, top: 8, bottom: 8, width: 2, background: "#e5e7eb" }} />
                  {order.history.map((h, i) => (
                    <div key={h.id} style={{ display: "flex", gap: 14, marginBottom: 4, position: "relative" }}>
                      <div style={{ position: "absolute", left: -20, top: 14, width: 10, height: 10, borderRadius: "50%", background: i === 0 ? "#2563eb" : "#d1d5db", border: "2px solid #fff" }} />
                      <div style={{ flex: 1, padding: "12px 16px", borderRadius: 10, border: "1px solid #f0f0f0", background: i === 0 ? "#eff6ff" : "#fff" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12 }}><div><div style={{ fontSize: 13, fontWeight: 600, color: "#111827", marginBottom: 2 }}>{h.action}</div><div style={{ fontSize: 12, color: "#6b7280" }}>{h.user}</div></div><div style={{ fontSize: 11, color: "#9ca3af", whiteSpace: "nowrap", flexShrink: 0 }}>{h.date} · {h.time}</div></div>
                        {h.detail && <div style={{ marginTop: 8, padding: "8px 12px", background: "#f9fafb", borderRadius: 6, fontSize: 12, color: "#374151", lineHeight: 1.5, borderLeft: "3px solid #e5e7eb" }}>{h.detail}</div>}
                      </div>
                    </div>
                  ))}
                </div></div>
              )}
            </div>
          </div>
        </div>

        {/* FOOTER */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 28px", borderTop: "1px solid #e5e7eb", background: "#fafbfc" }}>
          <div>{hasUnsavedChanges && <span style={{ fontSize: 12, color: "#d97706" }}>You have unsaved changes</span>}</div>
          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={handleCancel} style={{ padding: "10px 22px", background: "#fff", border: "1px solid #d1d5db", borderRadius: 8, color: "#374151", fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
            <button onClick={handleSave} style={{ padding: "10px 22px", background: hasUnsavedChanges ? "#2563eb" : "#93c5fd", border: "none", borderRadius: 8, color: "#fff", fontSize: 14, fontWeight: 700, cursor: hasUnsavedChanges ? "pointer" : "default", fontFamily: "inherit", boxShadow: hasUnsavedChanges ? "0 1px 3px rgba(37,99,235,0.3)" : "none" }}>Save Changes</button>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<OrderModal />);
</script>
</body>
</html>
